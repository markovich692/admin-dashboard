<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="script.js"></script>
    <title>Admin Dashboard</title>
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <div class="topbar">
        <!-- Search bar -->
        <div class="search-bar">
          <span class="search-bar__icon">icon</span>
          <input class="search-bar__input" type="text" />
        </div>

        <!-- User notification -->
        <div class="user-notification">
          <div class="user-notification__notification-icon">icon</div>

          <div class="user-notification__avatar">image</div>

          <span class="user-notification__username">username</span>
        </div>

        <!-- User welcome -->
        <div class="user-welcome">
          <span class="user-welcome__avatar">profile-image</span>

          <div class="user-welcome__texts">
            <span class="user-welcome__hello">Hi there,</span>
            <h2 class="user-welcome__username">Marc Diallo (@marcdiallo)</h2>
          </div>
        </div>

        <div class="header-actions">
          <button class="header-actions__button">New</button>
          <button class="header-actions__button">Upload</button>
          <button class="header-actions__button">Share</button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <span class="sidebar__icon sidebar__icon--app">icon</span>
        <h1 class="sidebar__title">Dashboard</h1>

        <span class="sidebar__icon sidebar__icon--home">icon</span>
        <span class="sidebar__item">Home</span>

        <span class="sidebar__icon sidebar__icon--profile">icon</span>
        <span class="sidebar__item">Profile</span>

        <span class="sidebar__icon sidebar__icon--messages">icon</span>
        <span class="sidebar__item">Messages</span>

        <span class="sidebar__icon sidebar__icon--history">icon</span>
        <span class="sidebar__item">History</span>

        <span class="sidebar__icon sidebar__icon--tasks">icon</span>
        <span class="sidebar__item">Tasks</span>

        <span class="sidebar__icon sidebar__icon--communities">icon</span>
        <span class="sidebar__item">Communities</span>

        <span class="sidebar__icon sidebar__icon--settings">icon</span>
        <span class="sidebar__item">Settings</span>

        <span class="sidebar__icon sidebar__icon--support">icon</span>
        <span class="sidebar__item">Support</span>

        <span class="sidebar__icon sidebar__icon--privacy">icon</span>
        <span class="sidebar__item">Privacy</span>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main-content">MAIN CONTENT</div>
    </div>
  </body>
</html>
