<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Admin Dashboard</title>
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <div class="header">
        <!-- TOP -->
        <div class="header-top">
          <div class="search-bar">
            <label for="search-bar__icon">icon</label>
            <input id="search-bar__user-input" type="text" />
          </div>

          <div class="notification">
            <div class="notification__icon">icon</div>

            <div class="notification__profile-img">image</div>

            <h3 class="notification__profile-name">Morgan Oakley</h3>
          </div>
        </div>

        <!-- BOTTOM -->

        <div class="header-bottom">
          <div class="welcome-user">
            <div class="welcome-user__profile-img">image</div>

            <div class="welcome-user__texts">
              <p class="welcome-user__text">Hi there,</p>

              <h2 class="welcome-user__name">Morgan Oakley (@morgan)</h2>
            </div>
          </div>

          <div class="buttons">
            <button>New</button>
            <button>Upload</button>
            <button>Share</button>
          </div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header__logo">logo</div>
          <h2 class="sidebar-header__text">Dashboard</h2>
        </div>

        <div class="sidebar-main-menu">
          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Home</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Profile</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Messages</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">History</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Tasks</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Communities</a>
          </div>
        </div>

        <div class="sidebar-secondary-menu">
          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Settings</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Support</a>
          </div>

          <div class="sidebar-menu">
            <div class="sidebar-menu__icon">icon</div>
            <a class="sidebar-menu__link" href="#">Privacy</a>
          </div>
        </div>

        <!-- MAIN MENU -->
      </div>

      <!-- MAIN CONTENT -->
      <div class="main-content"></div>
    </div>
  </body>
</html>
